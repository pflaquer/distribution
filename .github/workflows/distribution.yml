name: Adobe Sign Alert
on:
  repository_dispatch:
    types: [adobe_doc_signed] # Must match $EventType in your PowerShell

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        with:
          # Gmail SMTP Server Settings
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          # Pull from your GitHub Secrets
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Adobe Sign: Document Completed!"
          to: ${{ secrets.DESTINATION_EMAIL }}
          from: "Adobe Automation <${{ secrets.MAIL_USERNAME }}>"
          body: |
            The document has been successfully signed.
            Timestamp: ${{ github.event.client_payload.timestamp }}
